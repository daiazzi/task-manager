<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>todofile</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <header>
    <div class="brand" id="brand">tsk</div>
    <div class="header-section" id="project-chips" aria-label="Project filters"></div>
    <div class="header-section">
      <label class="toggle">
        <input type="checkbox" id="show-completed" checked>
        <span>Show completed</span>
      </label>
      <label class="toggle">
        <input type="checkbox" id="show-dates" checked>
        <span>Dates</span>
      </label>
      <label class="toggle">
        <input type="checkbox" id="show-gantt">
        <span>Gantt</span>
      </label>
      <label class="toggle">
        <input type="checkbox" id="show-calendar">
        <span>Calendar</span>
      </label>
    </div>
    <div class="header-section">
      <button id="theme-btn" title="Toggle light/dark mode" aria-label="Toggle theme">☾</button>
      <button id="refresh-btn">Refresh</button>
    </div>
  </header>

  <div id="warnings" class="warnings" hidden></div>

  <main id="main">
    <section id="task-list" class="pane"></section>
    <div id="splitter-gantt" class="splitter" role="separator" aria-orientation="vertical" tabindex="0" hidden></div>
    <section id="gantt-pane" class="pane" hidden>
      <div id="gantt-view" class="view"></div>
    </section>
    <div id="splitter-calendar" class="splitter" role="separator" aria-orientation="vertical" tabindex="0" hidden></div>
    <section id="calendar-pane" class="pane" hidden>
      <div id="calendar-view" class="view"></div>
    </section>
  </main>

  <div id="modal-host" hidden></div>

  <div id="toast-host" aria-live="polite"></div>

  <footer>
    <span id="todo-path"></span>
  </footer>

  <script type="module" src="/static/app.js"></script>
</body>
</html>
