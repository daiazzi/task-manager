<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>task-manager</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <header>
    <div class="brand" id="brand">tsk</div>
    <div class="header-section" id="project-chips" aria-label="Project filters"></div>
    <div class="header-section">
      <div class="view-toggle" role="tablist">
        <button id="view-gantt" class="view-btn active" role="tab">Gantt</button>
        <button id="view-calendar" class="view-btn" role="tab">Calendar</button>
      </div>
    </div>
    <div class="header-section">
      <label class="toggle">
        <input type="checkbox" id="show-completed" checked>
        <span>Show completed</span>
      </label>
    </div>
    <div class="header-section">
      <button id="theme-btn" title="Toggle light/dark mode" aria-label="Toggle theme">☾</button>
      <button id="refresh-btn">Refresh</button>
    </div>
  </header>

  <div id="warnings" class="warnings" hidden></div>

  <main>
    <section id="task-list" class="pane"></section>
    <section id="viz-pane" class="pane">
      <div id="gantt-view" class="view"></div>
      <div id="calendar-view" class="view" hidden></div>
    </section>
  </main>

  <div id="toast-host" aria-live="polite"></div>

  <footer>
    <span id="todo-path"></span>
  </footer>

  <script type="module" src="/static/app.js"></script>
</body>
</html>
